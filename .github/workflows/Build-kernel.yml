name: Build Tab A9+ Custom Kernel (KSU)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
      - name: 🛠️ Prepare Container
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y tzdata git software-properties-common bc build-essential flex bison libssl-dev libelf-dev clang llvm lld gcc-aarch64-linux-gnu tar zip wget python3 cpio xz-utils ccache

      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🗄️ Restore Compiler Cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ksu-ccache-${{ github.run_id }}
          restore-keys: |
            ksu-ccache-

      - name: 🩹 Apply Source Code & Permission Fixes
        run: |
          # 1. FIX PERMISSIONS (Execute rights for all scripts)
          find . -type f -name "*.sh" -exec chmod +x {} +
          chmod -R +x scripts/
          
          # 2. FIX VDSO OFFSET ERROR (The 'expected identifier' crash)
          # We use a broader search to kill any extern declaration of the sigtramp offset
          sed -i '/extern unsigned long vdso_offset_sigtramp;/d' arch/arm64/include/asm/vdso.h || true
          sed -i '/extern unsigned long vdso_offset_/d' arch/arm64/include/asm/vdso.h || true
          
          # 3. FIX WALT TRACE ERROR (The 'trace.h not found' crash)
          # Instead of patching code, we create a symlink so the compiler finds what it wants
          mkdir -p include/trace/
          ln -sf ../../kernel/sched/walt/trace.h include/trace/walt_trace.h || true
          # Force the include path in the Makefile
          sed -i 's|TRACE_INCLUDE_PATH .|TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h || true

          # 4. KSU SPECIFIC FIXES
          sed -i 's|register unsigned long current_stack_pointer asm ("sp");|#define current_stack_pointer ({ unsigned long sp; asm("mov %0, sp" : "=r"(sp)); sp; })|g' arch/arm64/include/asm/stack_pointer.h || true
          sed -i 's/static inline u32 current_sid(void)/static inline u32 ksu_current_sid_dummy(void)/g' drivers/kernelsu/selinux/selinux.h || true
          sed -i 's/!!!current->seccomp.mode/0/g' drivers/kernelsu/app_profile.c || true
          sed -i '1i #include <linux/types.h>\n#include <linux/kernel.h>\n#include <linux/slab.h>\n#include <linux/cred.h>' drivers/kernelsu/tiny_sulog.c || true

      - name: 📁 Standardize Makefiles
        run: |
          sed -i '/kernelsu/d' drivers/Makefile || true
          echo 'obj-y += kernelsu/' >> drivers/Makefile
          mkdir -p drivers/kernelsu/kernel drivers/kernelsu/selinux
          
          cat <<EOF > drivers/kernelsu/Makefile
          obj-y := allowlist.o apk_sign.o app_profile.o extras.o feature.o file_wrapper.o kernel_compat.o kernel_umount.o ksud.o lsm_hooks.o seccomp_cache.o setuid_hook.o su_mount_ns.o sucompat.o supercalls.o throne_tracker.o tiny_sulog.o util.o
          obj-y += kernel/ selinux/
          subdir-y += kernel selinux
          ccflags-y += -I\$(srctree)/security/selinux/include -I\$(srctree)/\$(src)/kernel -I\$(srctree)/\$(src)/selinux -I\$(srctree)/\$(src) -DCONFIG_KSU_NEXT_MANUAL_HOOK
          ccflags-y += -DKSU_NEXT_EXPECTED_SIZE=0x3e6 -DKSU_NEXT_EXPECTED_HASH=\"79e590113c4c4c0c222978e413a5faa801666957b1212a328e46c00c69821bf7\"
          EOF

          echo "obj-y := ksu.o" > drivers/kernelsu/kernel/Makefile
          echo "ccflags-y += -I\$(srctree)/drivers/kernelsu -I\$(srctree)/\$(src)/.." >> drivers/kernelsu/kernel/Makefile

          cat <<EOF > drivers/kernelsu/selinux/Makefile
          obj-y := rules.o selinux.o sepolicy.o
          ccflags-y += -I\$(srctree)/security/selinux/include -I\$(srctree)/drivers/kernelsu -I\$(srctree)/\$(src)/.. -Wno-strict-prototypes -Wno-int-conversion -I\$(objtree)/security/selinux
          EOF

      - name: ⚙️ Generate Kernel Configuration
        run: |
          export ARCH=arm64
          make ARCH=arm64 HOSTCC=gcc CC=gcc vendor/gta9pwifi_eur_open_defconfig
          ./scripts/config --file .config --enable KSU
          ./scripts/config --file .config --enable KSU_NEXT
          make ARCH=arm64 HOSTCC=gcc CC=gcc olddefconfig

      - name: 🔨 Resolve SELinux Headers
        run: |
          mkdir -p security/selinux/include
          wget -q https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/selinux/flask.h -O flask.h || true
          wget -q https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/selinux/av_permissions.h -O av_permissions.h || true
          echo -e "#ifndef SECINITSID_NUM\n#define SECINITSID_NUM 27\n#endif" >> flask.h
          cp flask.h security/selinux/include/flask.h || true
          cp av_permissions.h security/selinux/include/av_permissions.h || true

      - name: 🔨 Compile Kernel
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export CCACHE_EXEC=$(which ccache)
          ccache -M 5G
          make ARCH=arm64 \
          CC="ccache clang --target=aarch64-linux-gnu" \
          REAL_CC="ccache clang --target=aarch64-linux-gnu" \
          LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          HOSTCC="ccache gcc" CC_FOR_BUILD="ccache gcc" \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          -j$(nproc --all) \
          KCFLAGS="-I${GITHUB_WORKSPACE}/drivers/kernelsu -I${GITHUB_WORKSPACE}/security/selinux -I${GITHUB_WORKSPACE}/security/selinux/include -Wno-error=frame-larger-than= -Wno-implicit-function-declaration"
          ccache -s

      - name: 📦 Package Output
        run: |
          mkdir -p Final_Kernel
          find arch/arm64/boot/ -name "Image" -exec cp {} Final_Kernel/ \; || true
          cd Final_Kernel
          tar -cvf TabA9Plus-KSU-Kernel.tar Image || true
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          cp ../Image .
          zip -r9 ../TabA9Plus-KSU-AnyKernel3.zip * -x .git README.md
          
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-KSU-Kernel
          path: |
            Final_Kernel/TabA9Plus-KSU-Kernel.tar
            Final_Kernel/TabA9Plus-KSU-AnyKernel3.zip
