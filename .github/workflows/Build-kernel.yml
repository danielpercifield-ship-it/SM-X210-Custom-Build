name: Build Tab A9+ Custom Kernel (KSU)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Prepare Environment
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang llvm lld gcc-aarch64-linux-gnu tar zip wget python3 cpio xz-utils ccache curl dos2unix
          
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4

      - name: 🗄️ Restore Compiler Cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ksu-ccache-${{ github.run_id }}
          restore-keys: |
            ksu-ccache-
 
      - name: 📥 Integrate KernelSU-Next
        run: |
          rm -rf drivers/kernelsu
          
          # === REPAIR ACCIDENTAL MAKEFILE DELETION ===
          if ! grep -q "kernel/ certs/ mm/" Makefile; then
              sed -i '/core-y.*:=.*init/a core-y += kernel/ certs/ mm/ fs/ ipc/ security/ crypto/ block/' Makefile
          fi
          
          # Safely scrub any lingering quoted KSU strings from Makefiles
          sed -i 's|"drivers/kernelsu/"||g' Makefile || true
          sed -i 's|drivers/kernelsu/||g' Makefile || true
          sed -i 's|kernelsu/||g' Makefile || true
          sed -i 's/""//g' Makefile || true
          sed -i 's/""//g' arch/arm64/Makefile || true
          
          # Clone KSU-Next legacy
          git clone -b legacy https://github.com/KernelSU-Next/KernelSU-Next /tmp/ksun
          mv /tmp/ksun/kernel drivers/kernelsu
          
          sed -i '/kernelsu/d' drivers/Makefile || true
          echo "obj-y += kernelsu/" >> drivers/Makefile
     
      - name: 🩹 Apply Deep Source Code Fixes
        run: |
          # Architecture Fixes
          sed -i 's|register unsigned long current_stack_pointer asm ("sp");|/* Removed global sp */ #define current_stack_pointer ({ unsigned long sp; asm("mov %0, sp" : "=r"(sp)); sp; })|g' arch/arm64/include/asm/stack_pointer.h || true
          sed -i 's|"brk %0" : : "I"|"brk %0" : : "n"|g' arch/arm64/include/asm/kgdb.h || true
          sed -i '/extern unsigned long vdso_offset_/d' arch/arm64/include/asm/vdso.h || true
          sed -i 's|.*#define TRACE_INCLUDE_PATH.*|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h || true
          
          # Fix SELinux includes in KSU
          sed -i 's/static inline u32 current_sid(void)/static inline u32 ksu_current_sid_dummy(void)/g' drivers/kernelsu/selinux/selinux.h || true
          sed -i 's|#include "ss/policydb.h"|#include "../../security/selinux/ss/policydb.h"|g' drivers/kernelsu/kernel_compat.h || true
          
          # THE GLOBAL KSU PATH SHIFT
          sed -i 's|<kernelsu/ksu.h>|"../kernelsu/ksu.h"|g' drivers/input/input.c || true
          sed -i 's|<kernelsu/kernel/ksu.h>|"../kernelsu/ksu.h"|g' drivers/input/input.c || true
          find drivers/input fs kernel -type f -name "*.c" -exec sed -i 's|kernelsu/kernel/ksu.h|kernelsu/ksu.h|g' {} + || true
          
          # ROBUST SECCOMP STRIP
          sed -i 's/current->seccomp\.mode/0/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/current->seccomp\.filter/NULL/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/0 = 0;/\/\/ 0 = 0;/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/NULL = NULL;/\/\/ NULL = NULL;/g' drivers/kernelsu/app_profile.c || true
          
          # Fix KernelSU-Next SELinux structure for Kernel 5.4
          sed -i 's|db = \&policydb;|db = \&selinux_state.ss->policydb;|g' drivers/kernelsu/selinux/rules.c || true
          sed -i 's|selinux_status_update_policyload(0);|selinux_status_update_policyload(\&selinux_state, 0);|g' drivers/kernelsu/selinux/rules.c || true
          
          # Fix USB-C header path
          find drivers/usb/typec -name "pd_dpm_pdo_select.h" -exec sed -i 's|"inc/tcpci.h"|"tcpci.h"|g' {} + || true
          
          # Force version defines directly into supercalls.c
          sed -i '1i #define KSU_VERSION 11938\n#define KSU_VERSION_TAG "v1.0.0"\n#define KERNEL_SU_VERSION 11938\n#define KERNEL_SU_VERSION_TAG "v1.0.0"' drivers/kernelsu/supercalls.c || true
          
          # Eradicate double linking
          sed -i '/tiny_sulog\.o/d' drivers/kernelsu/Makefile || true
          
          # === SAMSUNG MISSING SYMBOL STUBS ===
          # Inject empty functions so the linker stops crying about missing Samsung debug logs
          echo -e "\nvoid handle_decomp_fail(void) {}\nvoid md_dump_slabinfo(void) {}\n" >> init/main.c
   
      - name: 🔑 Brute Force Export SELinux Symbols
        run: |
          # 1. Define target files based on SM-X210 / Kernel 5.4 structure
          HOOKS="security/selinux/hooks.c"
          HASHTAB="security/selinux/ss/hashtab.c"
          EBITMAP="security/selinux/ss/ebitmap.c"
          AVTAB="security/selinux/ss/avtab.c"
          SERVICES="security/selinux/ss/services.c"
          AVC="security/selinux/avc.c"
          NETLINK="security/selinux/netlink.c"
          STATUS="security/selinux/status.c"

          # Function to strip static and export specifically for Samsung's 5.4 syntax
          export_symbol() {
              local file=$1
              local sym=$2
              if [ -f "$file" ]; then
                  echo "Processing $sym in $file"
                  # Remove 'static' even if it's preceded by tabs/spaces or followed by __read_mostly
                  sed -i "s/static \(.*$sym\)/\1/g" "$file"
                  # Ensure the symbol is not marked as static in any way
                  sed -i "s/static struct/struct/g" "$file" 2>/dev/null || true
                  # Delete existing export to avoid duplicates, then add at end
                  sed -i "/EXPORT_SYMBOL_GPL($sym)/d" "$file"
                  echo "EXPORT_SYMBOL_GPL($sym);" >> "$file"
              else
                  echo "⚠️ $file not found, searching for $sym..."
                  ACTUAL_FILE=$(grep -l "$sym" security/selinux/*.c security/selinux/ss/*.c | head -n 1)
                  if [ -n "$ACTUAL_FILE" ]; then
                      sed -i "s/static \(.*$sym\)/\1/g" "$ACTUAL_FILE"
                      echo "EXPORT_SYMBOL_GPL($sym);" >> "$ACTUAL_FILE"
                  fi
              fi
          }

          # Execute exports
          export_symbol "$HOOKS" "selinux_state"
          export_symbol "$HOOKS" "selinux_blob_sizes"
          export_symbol "$HASHTAB" "hashtab_search"
          export_symbol "$HASHTAB" "hashtab_insert"
          export_symbol "$EBITMAP" "ebitmap_set_bit"
          export_symbol "$EBITMAP" "ebitmap_get_bit"
          export_symbol "$AVTAB" "avtab_search_node"
          export_symbol "$AVTAB" "avtab_search_node_next"
          export_symbol "$AVTAB" "avtab_insert_nonunique"
          export_symbol "$AVC" "avc_ss_reset"
          export_symbol "$NETLINK" "selnl_notify_policyload"
          
          # Status.c might not exist in 5.4, check services.c instead
          if [ -f "$STATUS" ]; then
              export_symbol "$STATUS" "selinux_status_update_policyload"
          else
              export_symbol "$SERVICES" "selinux_status_update_policyload"
          fi

          # 2. Fix the header visibility
          # This forces the symbols to be seen as 'extern' by KernelSU
          echo "Updating security.h..."
          cat <<EOF >> security/selinux/include/security.h
          extern struct selinux_state selinux_state;
          extern struct lsm_blob_sizes selinux_blob_sizes;
          EOF   
    
      - name: ⚙️ Generate Kernel Configuration
        run: |
          export ARCH=arm64
          find . -type f -name "Kconfig*" -exec dos2unix {} + || true
          chmod -R 755 scripts/
          find . -type f -name "*.sh" -exec chmod +x {} +
          touch drivers/kernelsu/Kconfig
          
          DEFCONFIG_FILE=$(find . -name "gta9pwifi_eur_open_defconfig" | head -n 1)
          cp "$DEFCONFIG_FILE" arch/arm64/configs/gta9pwifi_eur_open_defconfig
          
          make ARCH=arm64 HOSTCC=gcc CC="clang --target=aarch64-linux-gnu" CROSS_COMPILE=aarch64-linux-gnu- gta9pwifi_eur_open_defconfig
          
          # Enable KSU Configs
          ./scripts/config --file .config --enable KSU
          ./scripts/config --file .config --enable KSU_NEXT
          ./scripts/config --file .config --enable KSU_NEXT_MANUAL_HOOK
          
          # USER FIX: Force Enable SELinux in Config
          ./scripts/config --file .config --enable SECURITY_SELINUX
          ./scripts/config --file .config --enable SECURITY_SELINUX_BOOTPARAM
          ./scripts/config --file .config --disable SECURITY_SELINUX_DISABLE
          
          # Disable Samsung specific security that blocks KSU
          ./scripts/config --file .config --disable SECURITY_DEFEX
          ./scripts/config --file .config --disable SEC_RESTRICT_FORK
          
          # USER FIX: Disable LTO to prevent the linker from deleting the exported SELinux symbols
          ./scripts/config --file .config --disable LTO
          ./scripts/config --file .config --disable LTO_CLANG
          ./scripts/config --file .config --disable THINLTO
          
          make ARCH=arm64 HOSTCC=gcc CC="clang --target=aarch64-linux-gnu" CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
   
      - name: 🔨 Resolve SELinux Headers
        run: |
          mkdir -p security/selinux/include
          mkdir -p drivers/kernelsu
          
          cat <<EOF > security/selinux/include/flask.h
          #ifndef _SELINUX_FLASK_H_
          #define _SELINUX_FLASK_H_
          #define SECCLASS_PROCESS 1
          #define SECCLASS_FILE 2
          #define SECINITSID_KERNEL 1
          #define SECINITSID_SECURITY 2
          #define SECINITSID_UNLABELED 3
          #define SECINITSID_NUM 27
          #ifndef CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS
          #define CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS 9
          #endif
          #endif
          EOF
          cat <<EOF > security/selinux/include/av_permissions.h
          #ifndef _SELINUX_AV_PERMISSIONS_H_
          #define _SELINUX_AV_PERMISSIONS_H_
          #define PROCESS__TRANSITION 0x00000001UL
          #define PROCESS__DYNTRANSITION 0x00000002UL
          #define PROCESS__SETFSCREATE 0x00000004UL
          #define FILE__READ 0x00000001UL
          #define FILE__WRITE 0x00000002UL
          #endif
          EOF
          
          cp security/selinux/include/flask.h drivers/kernelsu/flask.h
          cp security/selinux/include/av_permissions.h drivers/kernelsu/av_permissions.h
      
      - name: 🔨 Compile Kernel (DOUBLE MAKE)
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          ccache -M 5G
          
          make ARCH=arm64 \
          CC="ccache clang --target=aarch64-linux-gnu" \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          -j1 \
          KCFLAGS="-Wno-error=implicit-function-declaration -Wno-error=implicit-int -Wno-error=int-conversion -Wno-error=unused-but-set-variable -Wno-error=strict-prototypes -Isecurity/selinux/include" \
          Image || echo "✅ First pass completed. KSU patched the tree. Starting Pass 2..."
          
          make ARCH=arm64 \
          CC="ccache clang --target=aarch64-linux-gnu" \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          -j$(nproc --all) \
          KCFLAGS="-Wno-error=implicit-function-declaration -Wno-error=implicit-int -Wno-error=int-conversion -Wno-error=unused-but-set-variable -Wno-error=strict-prototypes -Isecurity/selinux/include" \
          Image
      
      - name: 📦 Package Output
        run: |
          mkdir -p Final_Kernel
          if [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image Final_Kernel/
            echo "Build Success"
          else
            echo "Build Failed"
            exit 1
          fi
          
          # Create Flashable Zip (AnyKernel3)
          git clone https://github.com/osm0sis/AnyKernel3.git
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          cp Final_Kernel/Image AnyKernel3/
          cd AnyKernel3 && zip -r9 ../TabA9Plus-KSU-Kernel.zip *
    
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Kernel
          path: TabA9Plus-KSU-Kernel.zip
