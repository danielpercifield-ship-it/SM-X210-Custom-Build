name: Build Tab A9+ Custom Kernel (KSU)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
      - name: 🛠️ Prepare Container
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y tzdata git software-properties-common bc build-essential flex bison libssl-dev libelf-dev clang llvm lld gcc-aarch64-linux-gnu tar zip wget python3 cpio xz-utils ccache

      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🗄️ Restore Compiler Cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ksu-ccache-${{ github.run_id }}
          restore-keys: |
            ksu-ccache-

      - name: 📁 Setup Structure & Permissions
        run: |
          # 1. Fix permissions for all build scripts
          find . -type f -name "*.sh" -exec chmod +x {} +
          chmod -R +x scripts/
          
          # 2. Fix the KernelSU header path once and for all
          mkdir -p include/kernelsu
          cp -r drivers/kernelsu/* include/kernelsu/ || true
          
          # 3. Standardize the drivers Makefile
          sed -i '/kernelsu/d' drivers/Makefile || true
          echo 'obj-y += kernelsu/' >> drivers/Makefile

      - name: 🩹 Apply Deep Source Code Fixes
        run: |
          # FIX 1: WALT Trace Path (The 'trace.h not found' crash)
          # This forces the trace system to look in the actual scheduler directory
          sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h || true
          
          # FIX 2: VDSO Offset Collision
          sed -i '/extern unsigned long vdso_offset_/d' arch/arm64/include/asm/vdso.h || true
          
          # FIX 3: KernelSU prototypes (The 'declaration is not a prototype' error)
          # Instead of editing 50 files, we will use a compiler flag below.
          
          # FIX 4: Samsung specific stack pointer
          sed -i 's|register unsigned long current_stack_pointer asm ("sp");|#define current_stack_pointer ({ unsigned long sp; asm("mov %0, sp" : "=r"(sp)); sp; })|g' arch/arm64/include/asm/stack_pointer.h || true

      - name: ⚙️ Generate Kernel Configuration
        run: |
          export ARCH=arm64
          make ARCH=arm64 HOSTCC=gcc CC=gcc vendor/gta9pwifi_eur_open_defconfig
          ./scripts/config --file .config --enable KSU
          ./scripts/config --file .config --enable KSU_NEXT
          make ARCH=arm64 HOSTCC=gcc CC=gcc olddefconfig

      - name: 🔨 Resolve SELinux Headers
        run: |
          mkdir -p security/selinux/include
          wget -q https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/selinux/flask.h -O flask_ksu.h || true
          wget -q https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/selinux/av_permissions.h -O av_permissions.h || true
          
          echo "#ifndef SECINITSID_NUM" > security/selinux/include/flask.h
          echo "#define SECINITSID_NUM 27" >> security/selinux/include/flask.h
          echo "#endif" >> security/selinux/include/flask.h
          cat flask_ksu.h >> security/selinux/include/flask.h || true
          cp av_permissions.h security/selinux/include/av_permissions.h || true

      - name: 🔨 Compile Kernel
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export CCACHE_EXEC=$(which ccache)
          ccache -M 5G
          
          # ---> THE CRITICAL FLAGS UPDATE <---
          # We add -Wno-strict-prototypes and -Wno-unused-function to stop the "prototype" errors
          make ARCH=arm64 \
          CC="ccache clang --target=aarch64-linux-gnu" \
          REAL_CC="ccache clang --target=aarch64-linux-gnu" \
          LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          HOSTCC="ccache gcc" CC_FOR_BUILD="ccache gcc" \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          -j$(nproc --all) \
          KCFLAGS="-I${GITHUB_WORKSPACE}/include -I${GITHUB_WORKSPACE}/drivers -Wno-error=strict-prototypes -Wno-error=unused-function -Wno-error=frame-larger-than= -Wno-implicit-function-declaration"
          
          ccache -s

      - name: 📦 Package Output
        run: |
          mkdir -p Final_Kernel
          find arch/arm64/boot/ -name "Image" -exec cp {} Final_Kernel/ \; || true
          cd Final_Kernel
          tar -cvf TabA9Plus-KSU-Kernel.tar Image || true
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          cp ../Image .
          zip -r9 ../TabA9Plus-KSU-AnyKernel3.zip * -x .git README.md
          
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-KSU-Kernel
          path: |
            Final_Kernel/TabA9Plus-KSU-Kernel.tar
            Final_Kernel/TabA9Plus-KSU-AnyKernel3.zip

