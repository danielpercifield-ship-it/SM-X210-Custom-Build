name: Build Tab A9+ Custom Kernel (KSU)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
      - name: 🛠️ Prepare Container
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y tzdata git software-properties-common

      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🛠️ Install Toolchain & Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          # Added cpio and xz-utils to fix the kheaders Error 127
          apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang llvm lld gcc-aarch64-linux-gnu tar zip wget python3 cpio xz-utils

      - name: 📁 Setup & Permissions
        run: |
          # Brute-force unlock ALL scripts to fix the VDSO permission denied error
          find . -type f -name "*.sh" -exec chmod +x {} + || true
          chmod -R +x scripts/ || true
          chmod -R +x arch/arm64/kernel/vdso/ || true
          chmod +x scripts/config || true
          
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo 'obj-y += kernelsu/' >> drivers/Makefile
          fi
          
          echo "ccflags-y += -I${GITHUB_WORKSPACE}/drivers/kernelsu" >> drivers/kernelsu/Kbuild
          echo "ccflags-y += -I${GITHUB_WORKSPACE}/security/selinux" >> drivers/kernelsu/Kbuild
          echo "ccflags-y += -I${GITHUB_WORKSPACE}/security/selinux/include" >> drivers/kernelsu/Kbuild
          
          echo "ccflags-y += -I${GITHUB_WORKSPACE}/drivers/kernelsu" >> drivers/kernelsu/Makefile
          echo "ccflags-y += -I${GITHUB_WORKSPACE}/security/selinux" >> drivers/kernelsu/Makefile
          echo "ccflags-y += -I${GITHUB_WORKSPACE}/security/selinux/include" >> drivers/kernelsu/Makefile
          
          echo "ccflags-y += -I${GITHUB_WORKSPACE}/drivers" >> drivers/input/Makefile || true
          echo "ccflags-y += -I${GITHUB_WORKSPACE}/drivers" >> drivers/input/Kbuild || true
          
          mkdir -p include/kernelsu
          ln -sf ${GITHUB_WORKSPACE}/drivers/kernelsu ${GITHUB_WORKSPACE}/include/kernelsu || true

      - name: 🩹 Apply Deep Source Code Fixes
        run: |
          sed -i 's|register unsigned long current_stack_pointer asm ("sp");|/* Removed global sp */ #define current_stack_pointer ({ unsigned long sp; asm("mov %0, sp" : "=r"(sp)); sp; })|g' arch/arm64/include/asm/stack_pointer.h || true
          sed -i 's|"brk %0" : : "I"|"brk %0" : : "n"|g' arch/arm64/include/asm/kgdb.h || true
          ln -sf $(pwd)/arch/arm64/include/asm $(pwd)/include/asm || true
          sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h || true
          
          # Fix for KernelSU current_sid redefinition clash
          sed -i 's/static inline u32 current_sid(void)/static inline u32 ksu_current_sid_dummy(void)/g' drivers/kernelsu/selinux/selinux.h || true
          
          # Fix for VDSO Paradox (Deletes redundant extern declarations)
          sed -i '/extern unsigned long vdso_offset_/d' arch/arm64/include/asm/vdso.h || true
          
          mkdir -p drivers/input/touchscreen/focaltech_touch_spi/include/firmware
          touch drivers/input/touchscreen/focaltech_touch_spi/include/firmware/fw_sample.i || true

          sed -i 's/!!!current->seccomp.mode/0/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/current->seccomp.mode = 0;/\/\/current->seccomp.mode = 0;/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/current->seccomp.filter = NULL;/\/\/current->seccomp.filter = NULL;/g' drivers/kernelsu/app_profile.c || true

          sed -i 's/#define KERNEL_SU_VERSION KSU_VERSION/#define KERNEL_SU_VERSION 11938/g' drivers/kernelsu/kernel/ksu.h || true
          sed -i 's/#define KERNEL_SU_VERSION_TAG KSU_VERSION_TAG/#define KERNEL_SU_VERSION_TAG "v1.0.0"/g' drivers/kernelsu/kernel/ksu.h || true

          sed -i '1i #include <linux/types.h>' drivers/kernelsu/tiny_sulog.c || true
          sed -i '1i #include <linux/kernel.h>' drivers/kernelsu/tiny_sulog.c || true
          sed -i '1i #include <linux/spinlock.h>' drivers/kernelsu/tiny_sulog.c || true
          sed -i '1i #include <linux/slab.h>' drivers/kernelsu/tiny_sulog.c || true
          sed -i '1i #include <linux/ktime.h>' drivers/kernelsu/tiny_sulog.c || true
          sed -i '1i #include <linux/cred.h>' drivers/kernelsu/tiny_sulog.c || true

      - name: ⚙️ Generate Kernel Configuration
        run: |
          export ARCH=arm64
          make ARCH=arm64 HOSTCC=gcc CC=gcc vendor/gta9pwifi_eur_open_defconfig
          
          ./scripts/config --file .config --disable SECURITY_DEFEX
          ./scripts/config --file .config --disable SEC_RESTRICT_FORK
          ./scripts/config --file .config --enable KSU
          ./scripts/config --file .config --enable KSU_NEXT
          ./scripts/config --file .config --enable KSU_NEXT_MANUAL_HOOK
          
          make ARCH=arm64 HOSTCC=gcc CC=gcc olddefconfig

      - name: 🔨 Resolve SELinux Headers (The Enhanced Offline Bypass)
        run: |
          make ARCH=arm64 CC="clang --target=aarch64-linux-gnu" CROSS_COMPILE=aarch64-linux-gnu- HOSTCC=gcc CC_FOR_BUILD=gcc -j$(nproc --all) prepare
          mkdir -p security/selinux/include
          
          echo "Fetching KernelSU's dummy SELinux headers..."
          wget -q https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/selinux/flask.h -O flask.h || true
          wget -q https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/selinux/av_permissions.h -O av_permissions.h || true
          
          echo "Injecting Samsung Knox variables directly into the dummy flask.h to satisfy sidtab.h..."
          echo '#ifndef SECINITSID_NUM' >> flask.h
          echo '#define SECINITSID_NUM 27' >> flask.h
          echo '#endif' >> flask.h
          
          echo '#ifndef CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS' >> flask.h
          echo '#define CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS 9' >> flask.h
          echo '#endif' >> flask.h
          
          echo "Deploying the fully armed headers..."
          cp flask.h security/selinux/include/flask.h || true
          cp av_permissions.h security/selinux/include/av_permissions.h || true
          cp flask.h drivers/kernelsu/ || true
          cp av_permissions.h drivers/kernelsu/ || true
          cp flask.h drivers/kernelsu/kernel/ || true
          cp av_permissions.h drivers/kernelsu/kernel/ || true

      - name: 🔨 Compile Kernel (The Main Build)
        run: |
          make ARCH=arm64 \
          CC="clang --target=aarch64-linux-gnu" \
          REAL_CC="clang --target=aarch64-linux-gnu" \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld \
          HOSTCC=gcc \
          CC_FOR_BUILD=gcc \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          -j$(nproc --all) \
          KCFLAGS="-I${GITHUB_WORKSPACE}/drivers/kernelsu -I${GITHUB_WORKSPACE}/security/selinux -I${GITHUB_WORKSPACE}/security/selinux/include -I${GITHUB_WORKSPACE}/drivers -Wno-error=frame-larger-than= -Wno-implicit-function-declaration -Wno-strict-prototypes -Wno-int-conversion -Wno-enum-conversion"

      - name: 📦 Package Output for Flashing
        run: |
          mkdir -p Final_Kernel
          cp arch/arm64/boot/Image Final_Kernel/ || true
          cd Final_Kernel
          tar -cvf TabA9Plus-KSU-Kernel.tar Image || true
          
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-KSU-Kernel
          path: Final_Kernel/TabA9Plus-KSU-Kernel.tar
