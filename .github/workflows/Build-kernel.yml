name: Build vmlinux with KSU

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev curl unzip flex bison

      - name: Apply KernelSU Hotfixes
        run: |
          echo "=== Patching KernelSU Source ==="
          
          # Fix the selinux.c include path
          sed -i 's|#include "../ksu.h"|#include "ksu.h"|g' drivers/kernelsu/selinux/selinux.c
          
          # Fix the SIDTAB_HASH_BITS configuration error
          echo "ccflags-y += -DCONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS=9" >> drivers/kernelsu/Makefile
          
          # Fix the strict-prototypes warnings to ensure a clean build
          sed -i 's|void ksu_throne_tracker_init();|void ksu_throne_tracker_init(void);|g' drivers/kernelsu/throne_tracker.h
          sed -i 's|void ksu_throne_tracker_exit();|void ksu_throne_tracker_exit(void);|g' drivers/kernelsu/throne_tracker.h
          sed -i 's|void ksu_ksud_init();|void ksu_ksud_init(void);|g' drivers/kernelsu/ksud.h
          sed -i 's|void ksu_ksud_exit();|void ksu_ksud_exit(void);|g' drivers/kernelsu/ksud.h

      - name: Configure and Build vmlinux
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make clean
          make mrproper
          
          echo "=== Setting up Vendor Defconfig ==="
          # Copy the out-of-tree vendor config into the standard kernel config directory
          cp ../configs/vendor/Gta9pwifi_eur_open_defconfig arch/arm64/configs/custom_vendor_defconfig
          
          # Apply the configuration
          make custom_vendor_defconfig
          
          echo "=== Compiling vmlinux ==="
          make -j$(nproc) vmlinux
          
          echo "=== Stripping Debug Symbols (Shrinking File Size) ==="
          aarch64-linux-gnu-strip --strip-debug vmlinux

      - name: Upload vmlinux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-stripped
          path: vmlinux
