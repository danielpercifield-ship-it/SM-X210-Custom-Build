name: Build Tab A9+ Custom Kernel (KSU)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Prepare Environment
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang llvm lld gcc-aarch64-linux-gnu tar zip wget python3 cpio xz-utils ccache curl dos2unix
          
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4

      - name: 🗄️ Restore Compiler Cache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ksu-ccache-${{ github.run_id }}
          restore-keys: |
            ksu-ccache-
 
      - name: 📥 Integrate KernelSU-Next
        run: |
          rm -rf drivers/kernelsu
          
          # === REPAIR ACCIDENTAL MAKEFILE DELETION ===
          if ! grep -q "kernel/ certs/ mm/" Makefile; then
              sed -i '/core-y.*:=.*init/a core-y += kernel/ certs/ mm/ fs/ ipc/ security/ crypto/ block/' Makefile
          fi
          
          # Safely scrub any lingering quoted KSU strings from Makefiles
          sed -i 's|"drivers/kernelsu/"||g' Makefile || true
          sed -i 's|drivers/kernelsu/||g' Makefile || true
          sed -i 's|kernelsu/||g' Makefile || true
          sed -i 's/""//g' Makefile || true
          sed -i 's/""//g' arch/arm64/Makefile || true
          
          # Clone KSU-Next legacy
          git clone -b legacy https://github.com/KernelSU-Next/KernelSU-Next /tmp/ksun
          mv /tmp/ksun/kernel drivers/kernelsu
          
          sed -i '/kernelsu/d' drivers/Makefile || true
          echo "obj-y += kernelsu/" >> drivers/Makefile
     
      - name: 🩹 Apply Deep Source Code Fixes
        run: |
          # 1. FIX VDSO OFFSETS 
          VDSO_H="arch/arm64/include/asm/vdso.h"
          if [ -f "$VDSO_H" ]; then
              sed -i '/extern unsigned long vdso_offset_/d' "$VDSO_H"
          fi

          # 2. FIX WALT TRACE PATH
          TRACE_HEADER="kernel/sched/walt/trace.h"
          if [ -f "$TRACE_HEADER" ]; then
              sed -i '/#define TRACE_INCLUDE_PATH/c\#define TRACE_INCLUDE_PATH ../../kernel/sched/walt' "$TRACE_HEADER"
          fi

          # 3. Fix KernelSU SELinux logic for 5.4 API
          find drivers/kernelsu/selinux -type f -name "*.c" -exec sed -i 's|selinux_status_update_policyload(0);|selinux_status_update_policyload(\&selinux_state, 0);|g' {} + || true
          find drivers/kernelsu/selinux -type f -name "*.c" -exec sed -i 's|selinux_status_update_policyload(1);|selinux_status_update_policyload(\&selinux_state, 1);|g' {} + || true
          sed -i 's|db = \&policydb;|db = \&selinux_state.ss->policydb;|g' drivers/kernelsu/selinux/rules.c || true

          # 4. Fix Architecture/Stack Fixes (KGDB/SP)
          sed -i 's|register unsigned long current_stack_pointer asm ("sp");|#define current_stack_pointer ({ unsigned long sp; asm("mov %0, sp" : "=r"(sp)); sp; })|g' arch/arm64/include/asm/stack_pointer.h || true
          sed -i 's|"brk %0" : : "I"|"brk %0" : : "n"|g' arch/arm64/include/asm/kgdb.h || true   
          
          # 5. THE SYMLINK CHEAT CODE (Bypasses all KSU include errors)
          mkdir -p drivers/kernelsu/kernel
          ln -s ../ksu.h drivers/kernelsu/kernel/ksu.h || true
          
          # 6. ROBUST SECCOMP STRIP
          sed -i '/current->seccomp\.mode =/d' drivers/kernelsu/app_profile.c || true
          sed -i '/current->seccomp\.filter =/d' drivers/kernelsu/app_profile.c || true
          sed -i 's/!!!current->seccomp\.mode/0/g' drivers/kernelsu/app_profile.c || true
          
          # 7. SAMSUNG DUMMY STUBS
          echo -e "\nvoid handle_decomp_fail(void) {}\nvoid md_dump_slabinfo(void) {}\n" >> init/main.c
          
          # 8. FIX SAMSUNG USB-C TYPOS
          sed -i 's|"inc/tcpci.h"|"tcpci.h"|g' drivers/usb/typec/P86801_tcpc/inc/pd_dpm_pdo_select.h || true
          sed -i 's|"../inc/tcpci.h"|"inc/tcpci.h"|g' drivers/usb/typec/P86801_tcpc/tcpc_rt1711h.c || true
          sed -i 's|"../../inc/tcpci.h"|"../inc/tcpci.h"|g' drivers/usb/typec/P86801_tcpc/aw35615/aw35615_driver.c || true
          sed -i 's|"../inc/tcpci.h"|"inc/tcpci.h"|g' drivers/usb/typec/P86801_tcpc/tcpci_core.c || true
          
      - name: 🔑 Force Linker to Keep SELinux Symbols (Word Boundary Mode)
        run: |
          # 1. Clean existing exports to prevent duplicate definition errors
          SYMS="selinux_state selinux_blob_sizes hashtab_search hashtab_insert ebitmap_set_bit ebitmap_get_bit avtab_search_node avtab_search_node_next avtab_insert_nonunique avc_ss_reset selnl_notify_policyload selinux_status_update_policyload"
          for sym in $SYMS; do
              find security/selinux -name "*.c" -exec sed -i "/EXPORT_SYMBOL.*($sym)/d" {} + || true
          done
          sed -i "/EXPORT_SYMBOL.*(path_umount)/d" fs/namespace.c || true

          # 2. Use pure word boundaries to strip 'static' exactly where it matters.
          perl -pi -e 's/\bstatic\s+struct\s+selinux_state\s+selinux_state/struct selinux_state selinux_state/g' security/selinux/hooks.c
          perl -pi -e 's/\bstatic\s+struct\s+lsm_blob_sizes\s+selinux_blob_sizes/struct lsm_blob_sizes selinux_blob_sizes/g' security/selinux/hooks.c
          perl -pi -e 's/\bstatic\s+int\s+hashtab_search/int hashtab_search/g' security/selinux/ss/hashtab.c
          perl -pi -e 's/\bstatic\s+int\s+hashtab_insert/int hashtab_insert/g' security/selinux/ss/hashtab.c
          perl -pi -e 's/\bstatic\s+int\s+ebitmap_set_bit/int ebitmap_set_bit/g' security/selinux/ss/ebitmap.c
          perl -pi -e 's/\bstatic\s+int\s+ebitmap_get_bit/int ebitmap_get_bit/g' security/selinux/ss/ebitmap.c
          perl -pi -e 's/\bstatic\s+struct\s+avtab_node\s*\*\s*avtab_search_node\(/struct avtab_node *avtab_search_node(/g' security/selinux/ss/avtab.c
          perl -pi -e 's/\bstatic\s+struct\s+avtab_node\s*\*\s*avtab_search_node_next/struct avtab_node *avtab_search_node_next/g' security/selinux/ss/avtab.c
          perl -pi -e 's/\bstatic\s+struct\s+avtab_node\s*\*\s*avtab_insert_nonunique/struct avtab_node *avtab_insert_nonunique/g' security/selinux/ss/avtab.c
          perl -pi -e 's/\bstatic\s+void\s+avc_ss_reset/void avc_ss_reset/g' security/selinux/avc.c
          perl -pi -e 's/\bstatic\s+void\s+selnl_notify_policyload/void selnl_notify_policyload/g' security/selinux/netlink.c
          
          if [ -f security/selinux/status.c ]; then
              perl -pi -e 's/\bstatic\s+void\s+selinux_status_update_policyload/void selinux_status_update_policyload/g' security/selinux/status.c
          else
              perl -pi -e 's/\bstatic\s+void\s+selinux_status_update_policyload/void selinux_status_update_policyload/g' security/selinux/ss/services.c
          fi

          # 3. Inject EXPORT_SYMBOL_GPL at the end of files
          echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(selinux_state);" >> security/selinux/hooks.c
          echo "EXPORT_SYMBOL_GPL(selinux_blob_sizes);" >> security/selinux/hooks.c
          echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(hashtab_search);" >> security/selinux/ss/hashtab.c
          echo "EXPORT_SYMBOL_GPL(hashtab_insert);" >> security/selinux/ss/hashtab.c
          echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(ebitmap_set_bit);" >> security/selinux/ss/ebitmap.c
          echo "EXPORT_SYMBOL_GPL(ebitmap_get_bit);" >> security/selinux/ss/ebitmap.c
          echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(avtab_search_node);" >> security/selinux/ss/avtab.c
          echo "EXPORT_SYMBOL_GPL(avtab_search_node_next);" >> security/selinux/ss/avtab.c
          echo "EXPORT_SYMBOL_GPL(avtab_insert_nonunique);" >> security/selinux/ss/avtab.c
          echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(avc_ss_reset);" >> security/selinux/avc.c
          echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(selnl_notify_policyload);" >> security/selinux/netlink.c
          
          if [ -f security/selinux/status.c ]; then
              echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(selinux_status_update_policyload);" >> security/selinux/status.c
          else
              echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(selinux_status_update_policyload);" >> security/selinux/ss/services.c
          fi
          
          # USER FIX: Export path_umount from namespace.c where KSU injects it
          echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL_GPL(path_umount);" >> fs/namespace.c
          
          # 4. Inject EXTERN into the Linker Script to stop LTO stripping
          LDS="arch/arm64/kernel/vmlinux.lds.S"
          if [ -f "$LDS" ]; then
              for sym in $SYMS; do
                  sed -i "1i EXTERN($sym)" "$LDS"
              done
              sed -i "1i EXTERN(path_umount)" "$LDS"
          fi
          
          # 5. Global Header Visibility
          echo -e "\nextern struct selinux_state selinux_state;" >> security/selinux/include/security.h
          echo -e "\nextern struct lsm_blob_sizes selinux_blob_sizes;" >> security/selinux/include/security.h

      - name: 🕵️ Debugging Symbol Export (Diagnostics)
        run: |
          echo "=== CHECKING HOOKS.C ==="
          cat security/selinux/hooks.c | grep "EXPORT_SYMBOL_GPL(selinux_state)" || echo "❌ Missing selinux_state EXPORT!"
          cat security/selinux/hooks.c | grep -n "struct selinux_state selinux_state" || echo "❌ Missing un-static selinux_state!"
          
          echo "=== CHECKING HASHTAB.C ==="
          cat security/selinux/ss/hashtab.c | grep "EXPORT_SYMBOL_GPL(hashtab_search)" || echo "❌ Missing hashtab_search EXPORT!"
          cat security/selinux/ss/hashtab.c | grep -n "int hashtab_search" || echo "❌ Missing un-static hashtab_search!"
          
          echo "=== CHECKING NAMESPACE.C ==="
          cat fs/namespace.c | grep "EXPORT_SYMBOL_GPL(path_umount)" || echo "❌ Missing path_umount EXPORT!"
          
      - name: ⚙️ Generate Kernel Configuration
        run: |
          export ARCH=arm64
          find . -type f -name "Kconfig*" -exec dos2unix {} + || true
          chmod -R 755 scripts/
          find . -type f -name "*.sh" -exec chmod +x {} +
          touch drivers/kernelsu/Kconfig
          
          DEFCONFIG_FILE=$(find . -name "gta9pwifi_eur_open_defconfig" | head -n 1)
          cp "$DEFCONFIG_FILE" arch/arm64/configs/gta9pwifi_eur_open_defconfig
          
          make ARCH=arm64 HOSTCC=gcc CC="clang --target=aarch64-linux-gnu" CROSS_COMPILE=aarch64-linux-gnu- gta9pwifi_eur_open_defconfig
          
          # Enable KSU Configs
          ./scripts/config --file .config --enable KSU
          ./scripts/config --file .config --enable KSU_NEXT
          ./scripts/config --file .config --enable KSU_NEXT_MANUAL_HOOK
          
          # Force Enable SELinux in Config
          ./scripts/config --file .config --enable SECURITY_SELINUX
          ./scripts/config --file .config --enable SECURITY_SELINUX_BOOTPARAM
          ./scripts/config --file .config --disable SECURITY_SELINUX_DISABLE
          ./scripts/config --file .config --disable SECURITY_SELINUX_DEVELOP
          
          # Disable Samsung specific security that blocks KSU
          ./scripts/config --file .config --disable SECURITY_DEFEX
          ./scripts/config --file .config --disable SEC_RESTRICT_FORK
          
          # Disable optimizations that strip our custom exports
          ./scripts/config --file .config --disable TRIM_UNUSED_KSYMS
          ./scripts/config --file .config --disable UNUSED_SYMBOLS
          ./scripts/config --file .config --disable LTO
          ./scripts/config --file .config --disable LTO_CLANG
          ./scripts/config --file .config --disable THINLTO
          
          make ARCH=arm64 HOSTCC=gcc CC="clang --target=aarch64-linux-gnu" CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
   
      - name: 🔨 Resolve SELinux Headers
        run: |
          mkdir -p security/selinux/include
          mkdir -p drivers/kernelsu
          
          cat <<EOF > security/selinux/include/flask.h
          #ifndef _SELINUX_FLASK_H_
          #define _SELINUX_FLASK_H_
          #define SECCLASS_PROCESS 1
          #define SECCLASS_FILE 2
          #define SECINITSID_KERNEL 1
          #define SECINITSID_SECURITY 2
          #define SECINITSID_UNLABELED 3
          #define SECINITSID_NUM 27
          #ifndef CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS
          #define CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS 9
          #endif
          #endif
          EOF
          cat <<EOF > security/selinux/include/av_permissions.h
          #ifndef _SELINUX_AV_PERMISSIONS_H_
          #define _SELINUX_AV_PERMISSIONS_H_
          #define PROCESS__TRANSITION 0x00000001UL
          #define PROCESS__DYNTRANSITION 0x00000002UL
          #define PROCESS__SETFSCREATE 0x00000004UL
          #define FILE__READ 0x00000001UL
          #define FILE__WRITE 0x00000002UL
          #endif
          EOF
          
          cp security/selinux/include/flask.h drivers/kernelsu/flask.h
          cp security/selinux/include/av_permissions.h drivers/kernelsu/av_permissions.h
      
      - name: 🔨 Compile Kernel (DOUBLE MAKE WITH FORCED REBUILD)
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          ccache -M 5G
          
          # Force the linker to hold onto the SELinux symbols
          export KBUILD_LDFLAGS="-u selinux_state -u selinux_blob_sizes -u hashtab_search -u hashtab_insert -u ebitmap_set_bit -u ebitmap_get_bit -u avtab_search_node -u avtab_search_node_next -u avtab_insert_nonunique -u avc_ss_reset -u selnl_notify_policyload -u selinux_status_update_policyload"
          
          make ARCH=arm64 \
          CC="ccache clang --target=aarch64-linux-gnu" \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          -j$(nproc --all) \
          KCFLAGS="-Wno-error=implicit-function-declaration -Wno-error=implicit-int -Wno-error=int-conversion -Wno-error=unused-but-set-variable -Wno-error=strict-prototypes -Wno-error=incompatible-pointer-types -Wno-error=format-invalid-specifier -fno-lto -I$(pwd)/security/selinux/include -I$(pwd)/drivers" \
          Image || {
              echo "✅ First pass completed. KSU patched the tree."
              echo "🧹 Deleting stale filesystem objects to force recompilation of injected hooks..."
              rm -f fs/namespace.o fs/open.o fs/read_write.o fs/stat.o fs/exec.o
              
              echo "🚀 Starting Pass 2..."
              make ARCH=arm64 \
              CC="ccache clang --target=aarch64-linux-gnu" \
              CROSS_COMPILE=aarch64-linux-gnu- \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              HOSTCC=gcc \
              -j$(nproc --all) \
              KCFLAGS="-Wno-error=implicit-function-declaration -Wno-error=implicit-int -Wno-error=int-conversion -Wno-error=unused-but-set-variable -Wno-error=strict-prototypes -Wno-error=incompatible-pointer-types -Wno-error=format-invalid-specifier -fno-lto -I$(pwd)/security/selinux/include -I$(pwd)/drivers" \
              Image
          }
          
      - name: 💾 Save Compiler Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .ccache
          key: ksu-ccache-${{ github.run_id }}
          
      - name: 📦 Package Output
        run: |
          mkdir -p Final_Kernel
          if [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image Final_Kernel/
            echo "Build Success"
          else
            echo "Build Failed"
            exit 1
          fi
          
          # Create Flashable Zip (AnyKernel3)
          git clone https://github.com/osm0sis/AnyKernel3.git
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          cp Final_Kernel/Image AnyKernel3/
          cd AnyKernel3 && zip -r9 ../TabA9Plus-KSU-Kernel.zip *
    
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Kernel
          path: TabA9Plus-KSU-Kernel.zip
